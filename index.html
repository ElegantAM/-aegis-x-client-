<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS-X | AI Compliance Engine</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            resize: none;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 15px;
        }
        button:hover { background-color: #1d4ed8; }
        #result {
            margin-top: 25px;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AEGIS-X Engine</h2>
    <p>Professional Compliance Assessment</p>
    <textarea id="problem" rows="5" placeholder="Enter your compliance query here..."></textarea>
    <button onclick="runAnalysis()">RUN ANALYSIS</button>
    <div id="result">Waiting for input...</div>
</div>

<script>
    async function runAnalysis() {
        const input = document.getElementById('problem').value;
        const output = document.getElementById('result');
        
        if (!input.trim()) {
            alert("Please enter an issue to analyze.");
            return;
        }

        output.innerText = "Processing via Aegis-X Secure Link...";
        
        try {
            const response = await fetch('https://aegis-backend-oms5.onrender.com/submit', {
                method: 'POST',
                mode: 'cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ problem: input })
            });
            
            const data = await response.json();
            output.innerText = data.analysis || "Error: " + data.error;
        } catch (error) {
            output.innerText = "Connection Error: Please ensure the Aegis backend is awake.";
        }
    }
</script>

</body>
</html>
