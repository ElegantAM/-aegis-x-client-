<!DOCTYPE html>
<html lang="en">
<body>
    <h2>AEGIS-X ENGINE</h2>
    <textarea id="problem" placeholder="Describe your issue..."></textarea>
    <button onclick="run()">RUN ANALYSIS</button>
    <div id="result"></div>

    <script>
        async function run() {
            const problem = document.getElementById('problem').value;
            const res = document.getElementById('result');
            res.innerText = "Connecting...";
            
            try {
                const response = await fetch('https://aegis-backend-oms5.onrender.com/submit', {
                    method: 'POST',
                    mode: 'cors', // This is the fix for browser security blocks
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ problem: problem })
                });
                
                const data = await response.json();
                res.innerText = data.analysis || data.error;
            } catch (e) {
                res.innerText = "Connection Failed. Please ensure your Render backend is awake.";
            }
        }
    </script>
</body>
</html>
