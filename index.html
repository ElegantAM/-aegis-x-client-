<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis-X | Legal Compliance Engine</title>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 500px; padding: 20px; border: 1px solid #00ffcc; box-shadow: 0 0 15px #00ffcc55; }
        textarea { width: 100%; height: 100px; background: #1a1a1a; color: #fff; border: 1px solid #00ffcc; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00ffcc; border: none; color: #000; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; border-top: 1px solid #333; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h2>AEGIS-X ENGINE</h2>
        <textarea id="problem" placeholder="Describe your legal issue..."></textarea>
        <button onclick="analyze()">RUN ANALYSIS</button>
        <div id="result"></div>
    </div>

    <script>
        async function analyze() {
            const problem = document.getElementById('problem').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "Processing...";
            
            try {
                const response = await fetch('https://aegis-backend-oms5.onrender.com/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ problem: problem })
                });
                const data = await response.json();
                resDiv.innerText = data.analysis || data.error;
            } catch (err) {
                resDiv.innerText = "Error: Could not connect to Aegis Backend.";
            }
        }
    </script>
</body>
</html>
