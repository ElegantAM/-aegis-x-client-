<!DOCTYPE html>
<html lang="en">
<body>
    <div class="container">
        <h2>AEGIS-X ENGINE</h2>
        <textarea id="problem" placeholder="Describe your legal issue..."></textarea>
        <button onclick="analyze()">RUN ANALYSIS</button>
        <div id="result"></div>
    </div>
    <script>
        async function analyze() {
            const problem = document.getElementById('problem').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "Processing...";
            try {
                const response = await fetch('https://aegis-backend-oms5.onrender.com/submit', {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ problem: problem })
                });
                const data = await response.json();
                resDiv.innerText = data.analysis || data.error;
            } catch (err) {
                resDiv.innerText = "Error: Could not connect to Aegis Backend. Check your internet.";
            }
        }
    </script>
</body>
</html>
